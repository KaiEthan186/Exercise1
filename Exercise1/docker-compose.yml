version: '3.9'
services:
  db:
    image: mysql_db
    container_name: mysql_db
    build: db/.
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
      MYSQL_ROOT_HOST: '%'
    ports:
      - "33060:3306"

  app:
    image: test_app
    container_name: test_app
    build: .
